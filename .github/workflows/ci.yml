name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt -r requirements-dev.txt

      - name: Validate JSON files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          for path in [
              Path("flows/sharepoint-folder-demo.json"),
              Path("connector/openapi.json"),
              Path("connector/openapi-entra.json"),
              Path("infra/azuredeploy.json"),
              Path("src/host.json"),
          ]:
              with path.open(encoding="utf-8-sig") as fh:
                  json.load(fh)
              print(f"OK {path}")
          PY

      - name: Lint
        run: ruff check src/ tests/

      - name: Audit dependencies
        run: |
          pip install pip-audit
          pip-audit -r src/requirements.txt

      - name: Compile Python
        run: python -m py_compile src/function_app.py

      - name: Run tests
        run: pytest -q
